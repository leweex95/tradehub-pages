<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeHub — Forward Testing Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a14;
    --bg2: #10101e;
    --card: #14142a;
    --border: #1e1e3a;
    --accent: #00d4ff;
    --gold: #ffd700;
    --green: #00e676;
    --red: #ff5252;
    --text: #e0e0f0;
    --muted: #7070a0;
    --radius: 12px;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font);
         min-height: 100vh; padding: 0 0 60px; }

  /* ── Header ─────────────────────────────────────── */
  .header {
    background: linear-gradient(135deg, #0a0a20 0%, #12124a 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo { font-size: 1.6rem; font-weight: 800; color: var(--accent);
          letter-spacing: -0.5px; }
  .logo span { color: var(--gold); }
  .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px;
           font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .badge-live { background: #00e67620; color: var(--green); border: 1px solid #00e67650; }
  .badge-dummy { background: #ffd70020; color: var(--gold); border: 1px solid #ffd70050; }
  .generated { color: var(--muted); font-size: 13px; }
  .back-btn {
    color: var(--muted); text-decoration: none; font-size: 13px;
    padding: 6px 14px; border: 1px solid var(--border); border-radius: 20px;
    transition: all .2s;
  }
  .back-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* ── Main layout ────────────────────────────────── */
  .main { max-width: 1400px; margin: 0 auto; padding: 28px 24px; }

  /* ── KPI cards ──────────────────────────────────── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px; margin-bottom: 28px;
  }
  .kpi-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 20px;
    position: relative; overflow: hidden;
    transition: transform .2s, box-shadow .2s;
  }
  .kpi-card:hover { transform: translateY(-2px);
                    box-shadow: 0 8px 24px #0006; }
  .kpi-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent-color, var(--accent));
  }
  .kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase;
               letter-spacing: 1px; margin-bottom: 8px; }
  .kpi-value { font-size: 1.6rem; font-weight: 700; line-height: 1; }
  .kpi-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .neutral { color: var(--accent); }

  /* ── Section titles ─────────────────────────────── */
  .section { margin-bottom: 28px; }
  .section-title {
    font-size: 1rem; font-weight: 700; color: var(--accent);
    text-transform: uppercase; letter-spacing: 1px;
    border-left: 3px solid var(--accent); padding-left: 12px;
    margin-bottom: 16px;
  }

  /* ── Chart cards ────────────────────────────────── */
  .chart-grid { display: grid; gap: 20px; }
  .chart-grid-2 { grid-template-columns: 1fr; }
  @media(min-width: 900px) { .chart-grid-2 { grid-template-columns: 2fr 1fr; } }
  .chart-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
  }
  .chart-card h3 { font-size: 14px; color: var(--muted); margin-bottom: 14px;
                   text-transform: uppercase; letter-spacing: 0.8px; }
  canvas { max-height: 280px; }

  /* ── Filters ────────────────────────────────────── */
  .filter-bar {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 18px; margin-bottom: 16px;
  }
  .filter-bar label { font-size: 12px; color: var(--muted);
                      text-transform: uppercase; letter-spacing: 1px; }
  .filter-bar select, .filter-bar input {
    background: var(--bg2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; font-size: 13px; outline: none;
    transition: border-color .2s;
  }
  .filter-bar select:focus, .filter-bar input:focus {
    border-color: var(--accent);
  }

  /* ── Trade table ────────────────────────────────── */
  .table-wrap { overflow-x: auto; border-radius: var(--radius);
                border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead { background: var(--bg2); }
  thead th {
    padding: 10px 14px; text-align: left; font-size: 11px;
    text-transform: uppercase; letter-spacing: 1px; color: var(--muted);
    white-space: nowrap; cursor: pointer; user-select: none;
    transition: color .2s;
  }
  thead th:hover { color: var(--accent); }
  tbody tr { border-bottom: 1px solid var(--border);
             transition: background .15s; }
  tbody tr:hover { background: #ffffff08; }
  tbody td { padding: 8px 14px; white-space: nowrap; }
  .dir-buy { color: var(--green); font-weight: 600; }
  .dir-sell { color: var(--red); font-weight: 600; }
  .reason { display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 11px; font-weight: 600; }
  .reason-tp { background: #00e67615; color: var(--green); }
  .reason-sl { background: #ff525215; color: var(--red); }
  .reason-trailing { background: #ffd70015; color: var(--gold); }
  .reason-manual { background: #ffffff10; color: var(--muted); }
  .pagination { display: flex; gap: 8px; align-items: center;
                justify-content: center; margin-top: 14px; flex-wrap: wrap; }
  .page-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 6px 12px; border-radius: 6px;
    font-size: 13px; cursor: pointer; transition: all .2s;
  }
  .page-btn:hover, .page-btn.active { background: var(--accent);
    color: #000; border-color: var(--accent); }

  /* ── Symbol breakdown ───────────────────────────── */
  .sym-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .sym-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; cursor: pointer;
    transition: all .2s;
  }
  .sym-card:hover, .sym-card.active { border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent); }
  .sym-name { font-size: 14px; font-weight: 700; color: var(--accent); }
  .sym-stats { display: flex; gap: 14px; margin-top: 8px; flex-wrap: wrap; }
  .sym-stat { font-size: 12px; }
  .sym-stat span { color: var(--muted); }

  /* ── Weekly table ───────────────────────────────── */
  .weekly-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .week-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px;
  }
  .week-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .week-pnl { font-size: 1.1rem; font-weight: 700; }
  .week-r { font-size: 12px; color: var(--muted); }

  .footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 40px; }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo">Trade<span>Hub</span></div>
    <span class="badge" id="modeBadge">FORWARD TESTING</span>
  </div>
  <span class="generated" id="generatedAt"></span>
  <a href="../index.html" class="back-btn">← Back to Dashboard</a>
</header>

<div class="main">

  <!-- KPI Strip -->
  <section class="section">
    <div class="section-title">Key Metrics</div>
    <div class="kpi-grid" id="kpiGrid"></div>
  </section>

  <!-- Equity Curve + Symbol Distribution -->
  <section class="section">
    <div class="section-title">Equity & Performance</div>
    <div class="chart-grid chart-grid-2">
      <div class="chart-card">
        <h3>Equity Curve ($10,000 start)</h3>
        <canvas id="equityChart"></canvas>
      </div>
      <div class="chart-card">
        <h3>Symbol Distribution</h3>
        <canvas id="symbolPieChart"></canvas>
      </div>
    </div>
  </section>

  <!-- Weekly / Daily PnL -->
  <section class="section">
    <div class="section-title">Weekly P&amp;L</div>
    <div class="chart-card">
      <canvas id="weeklyBarChart"></canvas>
    </div>
  </section>

  <!-- Symbol Breakdown -->
  <section class="section">
    <div class="section-title">Symbol Breakdown
      <small style="font-size:11px;font-weight:400;color:var(--muted);margin-left:8px">
        (click to filter trades)
      </small>
    </div>
    <div class="sym-grid" id="symbolGrid"></div>
  </section>

  <!-- Trade List -->
  <section class="section">
    <div class="section-title">Trade Log</div>
    <div class="filter-bar">
      <label>Symbol</label>
      <select id="filterSymbol">
        <option value="">All Symbols</option>
      </select>
      <label>Direction</label>
      <select id="filterDir">
        <option value="">All</option>
        <option value="buy">Buy</option>
        <option value="sell">Sell</option>
      </select>
      <label>Exit</label>
      <select id="filterExit">
        <option value="">All</option>
        <option value="tp">TP Hit</option>
        <option value="sl">SL Hit</option>
        <option value="trailing">Trailing</option>
      </select>
      <label>Strategy</label>
      <select id="filterStrategy">
        <option value="">All</option>
      </select>
      <label style="margin-left:auto">Search</label>
      <input type="text" id="searchInput" placeholder="symbol / date…" style="width:140px">
    </div>
    <div class="table-wrap">
      <table id="tradeTable">
        <thead>
          <tr>
            <th data-col="id">#</th>
            <th data-col="entry_time">Entry Time</th>
            <th data-col="symbol">Symbol</th>
            <th data-col="direction">Dir</th>
            <th data-col="entry_price">Entry</th>
            <th data-col="exit_price">Exit</th>
            <th data-col="lots">Lots</th>
            <th data-col="pnl_usd">P&amp;L $</th>
            <th data-col="pnl_r">P&amp;L R</th>
            <th data-col="exit_reason">Exit</th>
            <th data-col="duration_bars">Bars</th>
          </tr>
        </thead>
        <tbody id="tradeBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </section>

  <!-- Weekly cards -->
  <section class="section">
    <div class="section-title">Week-by-Week Summary</div>
    <div class="weekly-grid" id="weeklyGrid"></div>
  </section>

</div>

<footer class="footer" id="footer"></footer>

const fmtUsd = n => (n >= 0 ? '+$' : '-$') + Math.abs(n).toFixed(2);

function colorPnl(el, v) {
  el.classList.remove('pos','neg','neutral');
  el.classList.add(v > 0 ? 'pos' : v < 0 ? 'neg' : 'neutral');
}

        <div class="sym-stat ${info.total_r >= 0 ? 'pos' : 'neg'}">${fmt(info.total_r,1)}R</div>
      </div>`;
    card.addEventListener('click', () => {
      activeSymbol = activeSymbol === name ? '' : name;
      $('filterSymbol').value = activeSymbol;
      renderSymbolGrid();
      applyFilters();

// ──────────────────────────────────────────────────────────────────────────────
// Trade Table with pagination + filtering
// ──────────────────────────────────────────────────────────────────────────────
const ROWS_PER_PAGE = 20;
let currentPage = 1;
let sortCol = 'entry_time';
let sortAsc = false;
let filteredTrades = [...DATA.trades];

// Populate filter dropdowns
const symbols = [...new Set(DATA.trades.map(t => t.symbol))].sort();
symbols.forEach(sym => {
  const opt = new Option(sym, sym);
  $('filterSymbol').add(opt);
});
const strategies = [...new Set(DATA.trades.map(t => t.strategy))].sort();
strategies.forEach(str => {
  const opt = new Option(str.replace(/_/g,' '), str);
  $('filterStrategy').add(opt);
});

function applyFilters() {
  const sym = $('filterSymbol').value;
  const dir = $('filterDir').value;
  const exit = $('filterExit').value;
  const strat = $('filterStrategy').value;
  const search = $('searchInput').value.toLowerCase();
  filteredTrades = DATA.trades.filter(t => {
    if (sym && t.symbol !== sym) return false;
    if (dir && t.direction !== dir) return false;
    if (exit && t.exit_reason !== exit) return false;
    if (strat && t.strategy !== strat) return false;
    if (search && !JSON.stringify(t).toLowerCase().includes(search)) return false;
    return true;
  });
  // Sort
  filteredTrades.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'string') va = va.toLowerCase(), vb = vb.toLowerCase();
    return sortAsc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
  });
  currentPage = 1;
  renderTable();
}

function renderTable() {
  const tbody = $('tradeBody');
  tbody.innerHTML = '';
  const start = (currentPage - 1) * ROWS_PER_PAGE;
  const page = filteredTrades.slice(start, start + ROWS_PER_PAGE);
  page.forEach(t => {
    const pnlCls = t.pnl_usd >= 0 ? 'pos' : 'neg';
    const exitCls = 'reason reason-' + t.exit_reason;
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${t.id}</td>
      <td>${t.entry_time.replace('T',' ')}</td>
      <td><strong>${t.symbol}</strong></td>
      <td class="dir-${t.direction}">${t.direction.toUpperCase()}</td>
      <td>${t.entry_price}</td>
      <td>${t.exit_price}</td>
      <td>${t.lots}</td>
      <td class="${pnlCls}">${fmtUsd(t.pnl_usd)}</td>
      <td class="${pnlCls}">${fmt(t.pnl_r,2)}R</td>
      <td><span class="${exitCls}">${t.exit_reason.toUpperCase()}</span></td>
      <td>${t.duration_bars}</td>`;
    tbody.appendChild(row);
  });
  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filteredTrades.length / ROWS_PER_PAGE);
  const pg = $('pagination');
  pg.innerHTML = '';
  const add = (label, page, active=false, disabled=false) => {
    const btn = document.createElement('button');
    btn.className = 'page-btn' + (active ? ' active' : '');
    btn.textContent = label;
    btn.disabled = disabled;
    btn.onclick = () => { currentPage = page; renderTable(); };
    pg.appendChild(btn);
  };
  add('«', 1, false, currentPage === 1);
  add('‹', currentPage - 1, false, currentPage === 1);
  const lo = Math.max(1, currentPage - 2);
  const hi = Math.min(total, currentPage + 2);
  for (let i = lo; i <= hi; i++) add(i, i, i === currentPage);
  add('›', currentPage + 1, false, currentPage === total);
  add('»', total, false, currentPage === total);
  const info = document.createElement('span');
  info.style.cssText = 'font-size:12px;color:var(--muted);margin-left:8px';
  info.textContent = `${filteredTrades.length} trades`;
  pg.appendChild(info);
}

// Column sort
document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }
    applyFilters();
  });
});

// Filter events
['filterSymbol','filterDir','filterExit','filterStrategy','searchInput']
  .forEach(id => $(id).addEventListener('change', applyFilters));
$('searchInput').addEventListener('input', applyFilters);

applyFilters(); // initial render

// ──────────────────────────────────────────────────────────────────────────────
// Weekly summary cards
// ──────────────────────────────────────────────────────────────────────────────
(function() {
  const grid = $('weeklyGrid');
  const weeks = Object.keys(s.weekly_pnl).sort();
  weeks.forEach(w => {
    const pnl = s.weekly_pnl[w];
    const r = s.weekly_r[w];
    const card = document.createElement('div');
    card.className = 'week-card';
    card.innerHTML = `
      <div class="week-label">${w}</div>
      <div class="week-pnl ${pnl >= 0 ? 'pos' : 'neg'}">${fmtUsd(pnl)}</div>
      <div class="week-r">${fmt(r,2)}R</div>`;
    grid.appendChild(card);
  });
})();

// ──────────────────────────────────────────────────────────────────────────────
// Footer
// ──────────────────────────────────────────────────────────────────────────────
$('footer').textContent =
  'TradeHub Forward Testing Dashboard · Generated ' + new Date().toUTCString();
</script>
</body>
</html>
